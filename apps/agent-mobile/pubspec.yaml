name: parsalo_agent
description: "Parsalo delivery agent mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.7.0

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Storage
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.20.1

  # Location
  geolocator: ^13.0.2

  # Audio (incoming-offer chime)
  audioplayers: ^6.1.0

  # Maps & deep links (job detail)
  google_maps_flutter: ^2.10.0
  url_launcher: ^6.3.1

  # PDF download + open (authorization letter)
  path_provider: ^2.1.5
  open_filex: ^4.5.0

  # Push notifications (incoming offers)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
